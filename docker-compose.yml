services:
  db:
    image: postgres:16-alpine
    container_name: trainova-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trainova
      POSTGRES_USER: trainova
      POSTGRES_PASSWORD: trainova
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainova -d trainova"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: trainova-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media

  frontend:
    build:
      context: ./frontend
    container_name: trainova-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  media_data:
